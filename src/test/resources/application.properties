spring.datasource.url=jdbc:h2:mem:loja99-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=false

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.base-dir=target/test-assets/uploads
app.auth.token-secret=loja99-test-secret
app.auth.token-expiration=PT2H
app.auth.cookie-name=loja99_auth
app.auth.cookie-secure=false
