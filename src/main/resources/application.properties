spring.application.name=Loja99
spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:99dev.pro}:${DB_PORT:5432}/${DB_NAME:pgtest}}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:5000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT_MS:3000}
spring.datasource.hikari.initialization-fail-timeout=${DB_INIT_FAIL_TIMEOUT_MS:10000}
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:10}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.error.include-message=always
server.error.include-binding-errors=never
